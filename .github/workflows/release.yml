name: release

# 打一个 v 开头的 tag 就会触发:建 Release → 各平台原生编译并上传二进制 →(可选)发布到 npm。
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # 先建好 Release(只建一次,避免多个编译任务并发创建时的竞争冲突)
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || \
          gh release create "$TAG" --repo "$REPO" --title "$TAG" \
            --notes "自动构建的跨平台二进制。安装方式见 使用说明.md,或 npm i -g moyu-cli。"

  build:
    name: build ${{ matrix.asset }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: moyu-darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset: moyu-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: moyu-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: moyu-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/moyu" "${{ matrix.asset }}"
      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        run: copy "target\${{ matrix.target }}\release\moyu.exe" "${{ matrix.asset }}"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --repo "${{ github.repository }}" --clobber

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish (skips if NPM_TOKEN not set)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN 未设置,跳过 npm 发布(在仓库 Settings → Secrets 添加 NPM_TOKEN 即可自动发布)。"
            exit 0
          fi
          npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
          npm publish --access public
