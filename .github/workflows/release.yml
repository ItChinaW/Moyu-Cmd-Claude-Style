name: release

# 打一个 v 开头的 tag 就会触发:建 Release → 编译 Windows + macOS 二进制并上传 →(可选)发布到 npm。
#   git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Windows 与 macOS 二进制。安装见 使用说明.md,或 npm i -g moyu-fish。"

  build-macos:
    name: build macOS (universal)
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Build both arches
        run: |
          cargo build --release --bin moyu --target aarch64-apple-darwin
          cargo build --release --bin moyu --target x86_64-apple-darwin
      - name: Make universal binary
        run: |
          lipo -create -output moyu-darwin-universal \
            target/aarch64-apple-darwin/release/moyu \
            target/x86_64-apple-darwin/release/moyu
          lipo -archs moyu-darwin-universal
      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" moyu-darwin-universal --repo "${{ github.repository }}" --clobber

  build-windows:
    name: build Windows (x64)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --bin moyu --target x86_64-pc-windows-msvc
      - name: Stage
        run: copy "target\x86_64-pc-windows-msvc\release\moyu.exe" "moyu-win32-x64.exe"
      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "moyu-win32-x64.exe" --repo "${{ github.repository }}" --clobber

  publish-npm:
    name: publish to npm
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish (skips if NPM_TOKEN not set)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN 未设置,跳过 npm 发布。"
            exit 0
          fi
          npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
          npm publish --access public
