name: ci

# 每次 push 到 master/main 或开 PR 时,跑 格式检查 + clippy + build + 测试。
# 与 release.yml(只在打 v* tag 时跑)互不影响。
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

# 同一分支新 push 时取消上一次还在跑的 CI,省额度。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: build & test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --all
